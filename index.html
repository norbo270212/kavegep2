<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kávégép Vezérlő</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 10px; }
        .card { background: #111; padding: 15px; border-radius: 10px; margin: auto; max-width: 450px; border: 2px solid #333; }
        
        /* Gomb rács a kávégép elrendezése alapján */
        .button-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        
        button { cursor: pointer; border: 3px solid #ccc; border-radius: 5px; font-weight: bold; color: yellow; text-shadow: 1px 1px 2px black; font-size: 16px; min-height: 85px; display: flex; align-items: center; justify-content: center; padding: 5px; }
        button:active { transform: scale(0.95); opacity: 0.8; }

        /* Színek a fotó alapján */
        .btn-blue { background: #0055ff; }    
        .btn-green { background: #00aa00; }   
        .btn-red { background: #ff0000; }     
        .btn-orange { background: #cc6666; }  
        .btn-brightred { background: #ee0000; } 
        .btn-maroon { background: #660000; }  
        .btn-pink { background: #ff00ff; grid-column: span 3; height: 65px; color: yellow; } 

        .btn-connect { background: #27ae60; color: white; width: 100%; height: 65px; font-size: 22px; margin-bottom: 15px; border: none; border-radius: 10px; }

        /* Admin rész */
        .admin-section { margin-top: 25px; padding: 15px; background: #222; border: 1px solid #444; border-radius: 10px; }
        .input-group { display: flex; justify-content: space-around; gap: 10px; margin-bottom: 15px; }
        .input-wrapper { display: flex; flex-direction: column; width: 45%; }
        label { font-size: 13px; color: #aaa; margin-bottom: 5px; text-align: left; }
        input { background: #333; border: 2px solid #555; color: #00ff00; padding: 15px; border-radius: 8px; font-size: 22px; text-align: center; width: 100%; box-sizing: border-box; font-weight: bold; }
        
        .btn-save { background: #8e44ad; color: white; width: 100%; padding: 20px; font-size: 20px; border: none; border-radius: 10px; }
        #status { font-size: 14px; color: #888; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div id="status">Állapot: Nincs kapcsolódva</div>
    <button class="btn-connect" id="csatBtn" onclick="kapcsolodas()">CSATLAKOZÁS</button>

    <div id="vezerlok" style="display:none;">
        <div class="button-grid">
            <button class="btn-blue" onclick="kuldes('b1')">Forró víz</button>
            <button class="btn-green" onclick="kuldes('b2')">Őrölt kávé<br>^</button>
            <button class="btn-red" onclick="kuldes('b3')">Cappuccino<br>(enter)</button>
            <button class="btn-orange" onclick="kuldes('b4')">hosszú kávé</button>
            <button class="btn-brightred" onclick="kuldes('b5')">v<br>Közepes kávé</button>
            <button class="btn-maroon" onclick="kuldes('b6')">(esc)<br>presszó kávé</button>
            <button class="btn-pink" onclick="kuldes('b7')">menü</button>
        </div>
        
        <div class="admin-section">
            <div class="input-group">
                <div class="input-wrapper">
                    <label>Sorszám (1-50)</label>
                    <input type="number" id="sorszamInput" placeholder="0">
                </div>
                <div class="input-wrapper">
                    <label>Kredit (Ft)</label>
                    <input type="number" id="kreditInput" placeholder="0">
                </div>
            </div>
            <button class="btn-save" onclick="kreditMentese()">KREDIT MENTÉSE</button>
        </div>
    </div>
</div>

<script>
    let karakterisztika;
    // Visszaállítva a te eredeti UUID-idra
    const SZERVIZ_UUID = "12345678-1234-1234-1234-1234567890ab";
    const CHAR_UUID = "12345678-1234-1234-1234-1234567890ac";

    async function kapcsolodas() {
        const st = document.getElementById('status');
        try {
            const eszkoz = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'KAVEGEP_BLE' }],
                optionalServices: [SZERVIZ_UUID]
            });
            const szerver = await eszkoz.gatt.connect();
            const szerviz = await szerver.getPrimaryService(SZERVIZ_UUID);
            karakterisztika = await szerviz.getCharacteristic(CHAR_UUID);
            
            st.innerText = "✅ KAPCSOLÓDVA";
            st.style.color = "#2ecc71";
            document.getElementById('vezerlok').style.display = 'block';
            document.getElementById('csatBtn').style.display = 'none';
        } catch (hiba) { 
            alert("Hiba: " + hiba);
            st.innerText = "Hiba történt.";
        }
    }

    async function kuldes(parancs) {
        if(!karakterisztika) return;
        try {
            await karakterisztika.writeValue(new TextEncoder().encode(parancs));
        } catch (hiba) { console.log(hiba); }
    }

    function kreditMentese() {
        const sorszamMezo = document.getElementById('sorszamInput');
        const kreditMezo = document.getElementById('kreditInput');
        
        const s = sorszamMezo.value;
        const k = kreditMezo.value;
        
        if(s && k) {
            kuldes(`k${s}:${k}`);
            alert("Elküldve: Sorszám " + s + " -> " + k + " Ft");
            sorszamMezo.value = "";
            kreditMezo.value = "";
        } else {
            alert("Töltsd ki mindkét mezőt!");
        }
    }
</script>
</body>
</html>
