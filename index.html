<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kávégép Vezérlő</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        
        /* Input mezők stílusa */
        input { width: 100%; padding: 15px; margin: 5px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: white; font-size: 18px; box-sizing: border-box; }
        
        /* Gombok elrendezése */
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        
        button { 
            cursor: pointer; border: 3px solid #fff; border-radius: 5px; 
            font-weight: bold; font-size: 16px; min-height: 80px; 
            display: flex; align-items: center; justify-content: center; 
            color: yellow; text-shadow: 1px 1px 2px black;
        }
        
        .btn-coffee { background: #0055ff; } /* Kék gombok */
        .btn-admin { background: red; color: white; } /* Admin gomb */
        .btn-save { background: #00aa00; color: white; width: 100%; padding: 15px; font-size: 18px; border: none; margin-top: 10px; }
        .btn-conn { background: #444; color: white; width: 100%; padding: 15px; border: none; margin-bottom: 20px; }
    </style>
</head>
<body>

    <button id="csatBtn" class="btn-conn" onclick="csatlakozas()">BLUETOOTH KAPCSOLAT</button>
    <div id="status" style="color: #0f0; margin-bottom: 10px;"></div>

    <div class="card" id="vezerlok" style="display:none;">
        <input type="number" id="slotInput" placeholder="Sorszám (Slot)">
        <input type="number" id="kreditInput" placeholder="Kredit">
        <button class="btn-save" onclick="kreditMentese()">MENTÉS</button>
    </div>

    <div class="btn-grid" id="gombok" style="display:none;">
        <button class="btn-coffee" onclick="kuldes('b1')">KÁVÉ 1</button>
        <button class="btn-coffee" onclick="kuldes('b2')">KÁVÉ 2</button>
        <button class="btn-coffee" onclick="kuldes('b3')">KÁVÉ 3</button>
        <button class="btn-coffee" onclick="kuldes('b4')">KÁVÉ 4</button>
        <button class="btn-coffee" onclick="kuldes('b5')">KÁVÉ 5</button>
        <button class="btn-coffee" onclick="kuldes('b6')">KÁVÉ 6</button>
        <button class="btn-admin" onclick="kuldes('b7')">ADMIN</button>
    </div>

    <script>
        const SERVICE_UUID = '12345678-1234-1234-1234-1234567890ab';
        const RX_UUID = '12345678-1234-1234-1234-1234567890ac';
        let bleChar = null;

        async function csatlakozas() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'KaveGep_BLE' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleChar = await service.getCharacteristic(RX_UUID);
                
                document.getElementById('status').innerText = "✅ CSATLAKOZVA";
                document.getElementById('vezerlok').style.display = 'block';
                document.getElementById('gombok').style.display = 'grid';
                document.getElementById('csatBtn').style.display = 'none';
            } catch (e) { alert("Hiba: " + e); }
        }

        async function kuldes(cmd) {
            if (bleChar) await bleChar.writeValue(new TextEncoder().encode(cmd));
        }

        async function kreditMentese() {
            const s = document.getElementById('slotInput').value;
            const k = document.getElementById('kreditInput').value;

            if (s && k) {
                // Parancs küldése (kSorszám:Kredit)
                await kuldes(`k${s}:${k}`);
                
                // MEZŐK TÖRLÉSE:
                document.getElementById('slotInput').value = '';
                document.getElementById('kreditInput').value = '';
            } else {
                alert("Töltsd ki a mezőket!");
            }
        }
    </script>
</body>
</html>
