<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kávégép Vezérlő</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        
        /* Csatlakozás gomb */
        #csatBtn { background: #444; color: white; width: 100%; padding: 20px; font-size: 18px; border: none; border-radius: 10px; margin-bottom: 20px; }
        
        /* Gomb rács (3 oszlop) */
        .gomb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .gomb-grid button { 
            background: #2c3e50; color: #f1c40f; border: 2px solid #34495e; 
            padding: 15px 5px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px;
        }
        
        /* Kredit blokk */
        .kredit-card { background: #333; padding: 15px; border-radius: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 5px; border: none; box-sizing: border-box; font-size: 16px; }
        .mentes-btn { background: #27ae60; color: white; width: 100%; padding: 15px; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <button id="csatBtn" onclick="csatlakozas()">BLUETOOTH KAPCSOLAT</button>

    <div id="vezerloFelulet" style="display:none;">
        <div class="gomb-grid">
            <button onclick="kuldes('b1')">Presszó</button>
            <button onclick="kuldes('b2')">Közepes kávé</button>
            <button onclick="kuldes('b3')">Hosszú kávé</button>
            <button onclick="kuldes('b4')">Cappuccino</button>
            <button onclick="kuldes('b5')">Enter</button>
            <button onclick="kuldes('b6')">Őrölt kávé</button>
            <button onclick="kuldes('b7')">Forró víz</button>
            <button onclick="kuldes('b8')">Menü</button>
        </div>

        <div class="kredit-card">
            <input type="number" id="slotInput" placeholder="Slot (Sorszám)">
            <input type="number" id="kreditInput" placeholder="Kredit">
            <button class="mentes-btn" onclick="mentesAdatok()">ADATOK MENTÉSE</button>
        </div>
    </div>

    <script>
        const SERVICE_UUID = '12345678-1234-1234-1234-1234567890ab';
        const RX_UUID = '12345678-1234-1234-1234-1234567890ac';
        let bleChar = null;

        async function csatlakozas() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'KaveGep_BLE' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleChar = await service.getCharacteristic(RX_UUID);
                
                document.getElementById('csatBtn').innerText = "✅ CSATLAKOZVA";
                document.getElementById('csatBtn').style.background = "#27ae60";
                document.getElementById('vezerloFelulet').style.display = 'block';
            } catch (e) { alert("Hiba a csatlakozásnál: " + e); }
        }

        async function kuldes(cmd) {
            if (bleChar) await bleChar.writeValue(new TextEncoder().encode(cmd));
        }

        async function mentesAdatok() {
            const s = document.getElementById('slotInput').value;
            const k = document.getElementById('kreditInput').value;

            if (s && k) {
                // Parancs küldése (pl: k5:10)
                await kuldes(`k${s}:${k}`);
                
                // MEZŐK TÖRLÉSE (ez a fontos lépés):
                document.getElementById('slotInput').value = '';
                document.getElementById('kreditInput').value = '';
            } else {
                alert("Kérlek, töltsd ki mindkét mezőt!");
            }
        }
    </script>
</body>
</html>
