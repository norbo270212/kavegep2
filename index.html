<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVEGEP ADMIN</title>
</head>
<body style="text-align:center; background:#1a1a1a; color:white; font-family:sans-serif; padding-top:50px;">
    <h2 style="color:#e67e22;">☕ KAVEGEP_BLE</h2>
    <button onclick="connect()" style="padding:20px; background:#27ae60; color:white; border:none; border-radius:10px; font-size:18px; cursor:pointer; font-weight:bold;">CSATLAKOZÁS</button>
    <p id="status" style="margin-top:20px; color:#bbb;">Állapot: Várakozás...</p>
    <hr style="border:0.5px solid #333; margin:30px 0;">
    <button onclick="send('b1')" style="padding:25px; width:80px; font-size:22px; margin:10px; background:#e67e22; border:none; color:white; border-radius:10px;">1</button>
    <button onclick="send('b2')" style="padding:25px; width:80px; font-size:22px; margin:10px; background:#e67e22; border:none; color:white; border-radius:10px;">2</button>
    <button onclick="send('b3')" style="padding:25px; width:80px; font-size:22px; margin:10px; background:#e67e22; border:none; color:white; border-radius:10px;">3</button>

    <script>
        let char;
        const S_UUID = "12345678-1234-1234-1234-1234567890ab";
        const C_UUID = "12345678-1234-1234-1234-1234567890ac";

        async function connect() {
            const st = document.getElementById('status');
            try {
                st.innerText = "Keresés...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'KAVEGEP_BLE' }],
                    optionalServices: [S_UUID]
                });
                st.innerText = "Kapcsolódás...";
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(S_UUID);
                char = await service.getCharacteristic(C_UUID);
                st.innerText = "✅ SIKERES KAPCSOLAT!";
                st.style.color = "#2ecc71";
            } catch (e) { 
                st.innerText = "Hiba: " + e; 
                console.error(e);
            }
        }

        async function send(cmd) {
            if(!char) return alert("Nincs kapcsolat! Előbb csatlakozz.");
            try {
                await char.writeValue(new TextEncoder().encode(cmd));
            } catch (e) { alert("Küldési hiba: " + e); }
        }
    </script>
</body>
</html>
