<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kávégép Vezérlő</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 10px; }
        .card { background: #111; padding: 15px; border-radius: 10px; margin: auto; max-width: 450px; border: 2px solid #333; }
        .button-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        button { cursor: pointer; border: 3px solid #ccc; border-radius: 5px; font-weight: bold; color: yellow; font-size: 16px; min-height: 80px; display: flex; align-items: center; justify-content: center; padding: 5px; }
        .btn-blue { background: #0055ff; } .btn-green { background: #00aa00; } .btn-red { background: #ff0000; }
        .btn-orange { background: #cc6666; } .btn-brightred { background: #ee0000; } .btn-maroon { background: #660000; }
        .btn-pink { background: #ff00ff; grid-column: span 3; height: 60px; }
        .btn-connect { background: #27ae60; color: white; width: 100%; height: 60px; font-size: 20px; border: none; }
        .admin-section { margin-top: 20px; padding: 15px; background: #222; border: 1px solid #444; border-radius: 10px; }
        input { background: #333; border: 1px solid #777; color: #00ff00; padding: 12px; border-radius: 5px; font-size: 22px; text-align: center; width: 100%; box-sizing: border-box; }
        .btn-save { background: #8e44ad; color: white; width: 100%; padding: 15px; border: none; margin-top: 10px; }
    </style>
</head>
<body>
<div class="card">
    <button class="btn-connect" id="csatBtn" onclick="kapcsolodas()">CSATLAKOZÁS</button>
    <div id="vezerlok" style="display:none;">
        <div class="button-grid">
            <button class="btn-blue" onclick="kuldes('b1')">Forró víz</button>
            <button class="btn-green" onclick="kuldes('b2')">Őrölt kávé</button>
            <button class="btn-red" onclick="kuldes('b3')">Cappuccino</button>
            <button class="btn-orange" onclick="kuldes('b4')">hosszú kávé</button>
            <button class="btn-brightred" onclick="kuldes('b5')">Közepes kávé</button>
            <button class="btn-maroon" onclick="kuldes('b6')">presszó kávé</button>
            <button class="btn-pink" onclick="kuldes('b7')">menü</button>
        </div>
        <div class="admin-section">
            <label>Sorszám (1-50)</label>
            <input type="number" id="sorszamInput" oninput="kreditLekeres()">
            <label>Kredit (Ft)</label>
            <input type="number" id="kreditInput">
            <button class="btn-save" onclick="kreditMentese()">KREDIT MENTÉSE</button>
        </div>
    </div>
</div>

<script>
    let char;
    const S_UUID = "12345678-1234-1234-1234-1234567890ab";
    const C_RX = "12345678-1234-1234-1234-1234567890ac";
    const C_TX = "12345678-1234-1234-1234-1234567890ad";

    async function kapcsolodas() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'KAVEGEP_BLE' }],
                optionalServices: [S_UUID]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(S_UUID);
            char = await service.getCharacteristic(C_RX);
            
            // Értesítés a TX-en érkezik
            const txChar = await service.getCharacteristic(C_TX);
            await txChar.startNotifications();
            txChar.addEventListener('characteristicvaluechanged', (event) => {
                document.getElementById('kreditInput').value = new TextDecoder().decode(event.target.value);
            });

            document.getElementById('vezerlok').style.display = 'block';
            document.getElementById('csatBtn').style.display = 'none';
        } catch (e) { alert("Hiba: " + e); }
    }

    async function kuldes(cmd) {
        if(!char) return;
        await char.writeValue(new TextEncoder().encode(cmd));
    }

    function kreditLekeres() {
        const s = document.getElementById('sorszamInput').value;
        if(s >= 1 && s <= 50) kuldes(`get:${s}`);
    }

    function kreditMentese() {
        const s = document.getElementById('sorszamInput').value;
        const k = document.getElementById('kreditInput').value;
        if(s && k) kuldes(`k${s}:${k}`);
    }
</script>
</body>
</html>
