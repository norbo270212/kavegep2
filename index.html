<!DOCTYPE html> 
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kávégép Vezérlő</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        button { width: 80%; padding: 20px; margin: 10px; font-size: 18px; border-radius: 10px; border: none; background: #007bff; color: white; }
        #csatlakozas { background: #28a745; }
    </style>
</head>
<body>
    <h1>Kávégép Vezérlő</h1>
    <button id="csatlakozas">Bluetooth Csatlakozás</button>
    <div id="vezerlok" style="display:none;">
        <button onclick="kuld('b1')">Kávé 1</button>
        <button onclick="kuld('b2')">Kávé 2</button>
        <button onclick="kuld('b3')">Kávé 3</button>
    </div>

    <script>
        const SERVICE_UUID = '12345678-1234-1234-1234-1234567890ab';
        const RX_UUID = '12345678-1234-1234-1234-1234567890ac';
        
        let bleDevice = null;
        let bleCharacteristic = null;

        document.getElementById('csatlakozas').onclick = async () => {
            try {
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'KaveGep_BLE' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleCharacteristic = await service.getCharacteristic(RX_UUID);
                
                document.getElementById('csatlakozas').innerText = "✅ Csatlakoztatva";
                document.getElementById('vezerlok').style.display = 'block';
            } catch (err) {
                alert("Hiba: " + err);
            }
        };

        async function kuld(parancs) {
            if (bleCharacteristic) {
                let encoder = new TextEncoder();
                await bleCharacteristic.writeValue(encoder.encode(parancs));
            } else {
                alert("Nincs csatlakozva!");
            }
        }
    </script>
</body>
</html>
