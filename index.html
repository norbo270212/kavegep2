<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Kávégép Vezérlő</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .gomb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        button { padding: 15px; font-weight: bold; cursor: pointer; border-radius: 5px; border: none; min-height: 60px; }
        .admin-section { background: #222; padding: 20px; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; color: #000; }
        /* 7. gomb a teljes szélességet viszi */
        .full-width { grid-column: span 3; background: #ff00ff; }
    </style>
</head>
<body>
    <button id="csatBtn" style="background:#007bff; color:white; width:100%; height:50px; margin-bottom:20px;" onclick="kapcsolodas()">BLUETOOTH CSATLAKOZÁS</button>
    
    <div id="vezerlok" style="display:none;">
        <div class="gomb-grid">
            <button onclick="kuldes('b1')" style="background:#963c05;">Presszó</button>
            <button onclick="kuldes('b2')" style="background:#bd5506;">Közepes</button>
            <button onclick="kuldes('b3')" style="background:#cc6666;">Hosszú</button>
            <button onclick="kuldes('b4')" style="background:#c99506;">Cappu</button>
            <button onclick="kuldes('b5')" style="background:#00aa00;">Őrölt</button>
            <button onclick="kuldes('b6')" style="background:#067bc9;">Víz</button>
            <button onclick="kuldes('b7')" class="full-width">MENÜ / 7. GOMB</button>
        </div>

        <div class="admin-section">
            <input type="number" id="slot" placeholder="Slot (pl. 1)">
            <input type="text" id="kredit_kijelzo" placeholder="Aktuális kredit" readonly style="background:#ddd;">
            <button onclick="lekerdezes()" style="background:#28a745; width:100%; color:white; padding:10px; border:none; border-radius:5px;">LEKÉRDEZÉS</button>
            <input type="number" id="ujKredit" placeholder="Új összeg">
            <button onclick="mentes()" style="background:#6f42c1; width:100%; color:white; padding:10px; border:none; border-radius:5px; margin-top:10px;">MENTÉS</button>
        </div>
    </div>

    <script>
        let char;
        const S_UUID = "12345678-1234-1234-1234-1234567890ab";
        const C_RX = "12345678-1234-1234-1234-1234567890ac";

        async function kapcsolodas() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'KaveGep_BLE' }],
                    optionalServices: [S_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(S_UUID);
                char = await service.getCharacteristic(C_RX);
                
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (event) => {
                    const val = new TextDecoder().decode(event.target.value);
                    if (val.startsWith("CREDIT:")) {
                        document.getElementById('kredit_kijelzo').value = val.split(":")[1];
                    }
                });

                document.getElementById('csatBtn').style.display = 'none';
                document.getElementById('vezerlok').style.display = 'block';
            } catch (e) { alert("Hiba: " + e); }
        }

        async function kuldes(cmd) { if(char) await char.writeValue(new TextEncoder().encode(cmd)); }
        
        async function lekerdezes() {
            const s = document.getElementById('slot').value;
            if(s) await kuldes('g' + s);
        }

        async function mentes() {
            const s = document.getElementById('slot').value;
            const k = document.getElementById('ujKredit').value;
            if(s && k) await kuldes('k' + s + ':' + k);
        }
    </script>
</body>
</html>
