<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kávégép Vezérlő</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 10px; }
        .card { background: #111; padding: 15px; border-radius: 10px; display: block; margin: auto; max-width: 450px; border: 2px solid #333; }
        
        /* Gomb rács elrendezés a kép alapján */
        .button-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        
        button { cursor: pointer; border: 3px solid #ccc; border-radius: 5px; font-weight: bold; transition: 0.2s; color: yellow; text-shadow: 1px 1px 2px black; font-size: 16px; min-height: 80px; display: flex; align-items: center; justify-content: center; padding: 5px; }
        button:active { transform: scale(0.95); opacity: 0.8; }

        /* Színek a beküldött fotó alapján */
        .btn-blue { background: #0055ff; }    /* Forró víz */
        .btn-green { background: #00aa00; }   /* Őrölt kávé */
        .btn-red { background: #ff0000; }     /* Cappuccino */
        .btn-orange { background: #cc6666; }  /* Hosszú kávé */
        .btn-brightred { background: #ee0000; } /* Közepes kávé */
        .btn-maroon { background: #660000; }  /* Presszó kávé */
        .btn-pink { background: #ff00ff; grid-column: span 3; height: 60px; color: yellow; } /* Menü */

        .btn-connect { background: #27ae60; color: white; width: 100%; height: 60px; font-size: 20px; margin-bottom: 10px; border: none; }

        /* Kredit rész */
        .admin-section { margin-top: 20px; padding: 15px; background: #222; border: 1px solid #444; border-radius: 10px; }
        .input-group { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
        .input-wrapper { display: flex; flex-direction: column; width: 48%; }
        label { font-size: 12px; color: #aaa; margin-bottom: 5px; text-align: left; }
        input { background: #333; border: 1px solid #777; color: #00ff00; padding: 12px; border-radius: 5px; font-size: 22px; text-align: center; font-weight: bold; width: 100%; box-sizing: border-box; }
        
        .btn-save { background: #8e44ad; color: white; width: 100%; padding: 15px; font-size: 18px; border: none; }
        #status { font-size: 14px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div id="status">Állapot: Nincs kapcsolódva</div>
    <button class="btn-connect" id="csatBtn" onclick="kapcsolodas()">CSATLAKOZÁS</button>

    <div id="vezerlok" style="display:none;">
        <div class="button-grid">
            <button class="btn-blue" onclick="kuldes('b1')">Forró víz</button>
            <button class="btn-green" onclick="kuldes('b2')">Őrölt kávé<br>^</button>
            <button class="btn-red" onclick="kuldes('b3')">Cappuccino<br>(enter)</button>
            <button class="btn-orange" onclick="kuldes('b4')">hosszú kávé</button>
            <button class="btn-brightred" onclick="kuldes('b5')">v<br>Közepes kávé</button>
            <button class="btn-maroon" onclick="kuldes('b6')">(esc)<br>presszó kávé</button>
            <button class="btn-pink" onclick="kuldes('b7')">menü</button>
        </div>
        
        <div class="admin-section">
            <div class="input-group">
                <div class="input-wrapper">
                    <label>Sorszám (1-50)</label>
                    <input type="number" id="sorszamInput" placeholder="0" oninput="kreditLekeres()">
                </div>
                <div class="input-wrapper">
                    <label>Jelenlegi Kredit (Ft)</label>
                    <input type="number" id="kreditInput" placeholder="0">
                </div>
            </div>
            <p style="font-size: 12px; color: #888;">Írd át a kreditet a módosításhoz:</p>
            <button class="btn-save" onclick="kreditMentese()">KREDIT FRISSÍTÉSE</button>
        </div>
    </div>
</div>

<script>
    let karakterisztika;
    const SZERVIZ_UUID = "12345678-1234-1234-1234-1234567890ab";
    const CHAR_UUID = "12345678-1234-1234-1234-1234567890ac";

    async function kapcsolodas() {
        try {
            const eszkoz = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'KAVEGEP_BLE' }],
                optionalServices: [SZERVIZ_UUID]
            });
            const szerver = await eszkoz.gatt.connect();
            const szerviz = await szerver.getPrimaryService(SZERVIZ_UUID);
            karakterisztika = await szerviz.getCharacteristic(CHAR_UUID);
            
            // Értesítések bekapcsolása a visszaküldött adatokhoz
            await karakterisztika.startNotifications();
            karakterisztika.addEventListener('characteristicvaluechanged', adatErkezett);

            document.getElementById('status').innerText = "✅ KAPCSOLÓDVA";
            document.getElementById('vezerlok').style.display = 'block';
            document.getElementById('csatBtn').style.display = 'none';
        } catch (hiba) { alert("Hiba: " + hiba); }
    }

    // Amikor az ESP32 adatot küld vissza
    void function adatErkezett(event) {
        let adat = new TextDecoder().decode(event.target.value);
        if(!isNaN(adat)) { // Ha szám érkezik, az a kredit
            document.getElementById('kreditInput').value = adat;
        }
    }

    async function kuldes(parancs) {
        if(!karakterisztika) return;
        try {
            await karakterisztika.writeValue(new TextEncoder().encode(parancs));
        } catch (hiba) { console.log(hiba); }
    }

    // Automatikusan lekéri a kreditet, ha beírod a sorszámot
    function kreditLekeres() {
        const sorszam = document.getElementById('sorszamInput').value;
        if(sorszam >= 1 && sorszam <= 50) {
            kuldes(`get:${sorszam}`); // Új parancs az ESP-nek
        }
    }

    function kreditMentese() {
        const sorszam = document.getElementById('sorszamInput').value;
        const kredit = document.getElementById('kreditInput').value;
        if(sorszam && kredit) {
            kuldes(`k${sorszam}:${kredit}`);
            alert("Sorszám " + sorszam + " frissítve " + kredit + " Ft-ra!");
        }
    }
</script>
</body>
</html>
